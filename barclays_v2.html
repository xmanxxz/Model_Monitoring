<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Barclays — LLM Model vs Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#00395D;overflow:hidden;width:100vw;height:100vh}
canvas{display:block}
#ui{position:fixed;bottom:0;left:0;right:0;height:56px;background:rgba(0,57,93,.92);
  border-top:2px solid rgba(0,174,239,.3);display:flex;align-items:center;
  justify-content:center;gap:16px;z-index:100}
.btn{background:none;border:1.5px solid rgba(255,255,255,.25);color:rgba(255,255,255,.8);
  font-family:'Caveat',cursive;font-size:16px;padding:6px 20px;border-radius:30px;cursor:pointer;
  transition:all .2s}
.btn:hover{background:rgba(0,174,239,.2);border-color:#00AEEF;color:white}
#tl-wrap{width:260px;height:5px;background:rgba(255,255,255,.15);border-radius:3px;cursor:pointer}
#tl-fill{height:100%;background:#00AEEF;border-radius:3px;width:0%;transition:width .15s linear}
#lbl{font-family:'Caveat',cursive;font-size:15px;color:rgba(255,255,255,.5);min-width:44px}
#stitle{font-family:'Caveat',cursive;font-size:15px;color:rgba(255,255,255,.6);min-width:200px;text-align:center}
#dots{position:fixed;bottom:62px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;z-index:100}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:all .2s}
.dot.on{background:#00AEEF;transform:scale(1.4)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="dots"></div>
<div id="ui">
  <button class="btn" id="playBtn">⏸</button>
  <button class="btn" id="rstBtn">↩</button>
  <div id="tl-wrap"><div id="tl-fill"></div></div>
  <div id="lbl">0:00</div>
  <div id="stitle">Intro</div>
</div>

<script>
// ═══════════════════════════════
// CANVAS + ENGINE
// ═══════════════════════════════
const cvs=document.getElementById('c');
const ctx=cvs.getContext('2d');
let W,H;
const resize=()=>{W=cvs.width=innerWidth;H=cvs.height=innerHeight-56;};
resize();addEventListener('resize',resize);

let T=0,paused=false,lastTs=null;
const TOTAL=88;
const ease=x=>1-Math.pow(1-x,3);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const prog=(s,d,t)=>clamp((t-s)/d,0,1);

// ═══════════════════════════════
// BARCLAYS PALETTE
// ═══════════════════════════════
const B={
  navy:'#00395D',   // primary dark
  blue:'#00AEEF',   // signature eagle blue
  mid:'#005B8C',    // mid navy
  pale:'#E8F4FB',   // light blue bg
  white:'#FFFFFF',
  offWhite:'#F4F7FA',
  paper:'#FAFAF8',
  ink:'#1A2B3C',
  slate:'#4A6070',
  muted:'#8BA5B5',
  red:'#D0021B',
  amber:'#F5A623',
  green:'#27AE60',
  purple:'#7B2D8B',
};

// ═══════════════════════════════
// DRAW HELPERS
// ═══════════════════════════════
function clr(){
  // clean white paper bg
  ctx.fillStyle=B.paper;ctx.fillRect(0,0,W,H);
  // very subtle horizontal rules
  ctx.strokeStyle='rgba(0,57,93,.06)';ctx.lineWidth=1;
  for(let y=48;y<H;y+=48){
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }
}

function txt(t,x,y,o={}){
  const{size=18,color=B.ink,align='left',weight='400',alpha=1}=o;
  ctx.save();ctx.globalAlpha*=alpha;
  ctx.font=`${weight} ${size}px Caveat`;ctx.fillStyle=color;ctx.textAlign=align;
  t.split('\n').forEach((l,i)=>ctx.fillText(l,x,y+i*(size*1.3)));
  ctx.restore();
}

function rbox(x,y,w,h,o={}){
  const{fill=B.white,stroke=null,lw=2,r=10,a=1}=o;
  ctx.save();ctx.globalAlpha*=a;
  ctx.beginPath();ctx.roundRect(x,y,w,h,r);
  ctx.fillStyle=fill;ctx.fill();
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();}
  ctx.restore();
}

function shadow(x,y,w,h,r=12){
  ctx.save();ctx.shadowColor='rgba(0,57,93,.14)';ctx.shadowBlur=18;ctx.shadowOffsetY=4;
  ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fillStyle=B.white;ctx.fill();
  ctx.restore();
}

function pill(x,y,w,h,fill,label,labelColor=B.white,size=15){
  rbox(x,y,w,h,{fill,r:h/2});
  txt(label,x+w/2,y+h/2+size*.36,{size,color:labelColor,align:'center',weight:'700'});
}

// ── Barclays Eagle (simplified SVG-in-canvas) ──
function eagle(x,y,s=1,a=1){
  ctx.save();ctx.globalAlpha*=a;ctx.translate(x,y);ctx.scale(s,s);
  ctx.fillStyle=B.blue;
  // wing left
  ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(-28,-8,-46,4,-40,20);
  ctx.bezierCurveTo(-32,14,-18,10,0,16);ctx.closePath();ctx.fill();
  // wing right
  ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(28,-8,46,4,40,20);
  ctx.bezierCurveTo(32,14,18,10,0,16);ctx.closePath();ctx.fill();
  // body
  ctx.beginPath();ctx.ellipse(0,10,8,14,0,0,Math.PI*2);ctx.fill();
  // head
  ctx.beginPath();ctx.arc(0,-4,6,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// ── Top bar per scene ──
function topbar(title,subtitle='',a=1){
  ctx.save();ctx.globalAlpha*=a;
  // bar
  ctx.fillStyle=B.navy;ctx.fillRect(0,0,W,64);
  // blue accent line
  ctx.fillStyle=B.blue;ctx.fillRect(0,62,W,3);
  // eagle
  eagle(46,32,.8);
  // BARCLAYS wordmark
  txt('BARCLAYS',86,42,{size:18,color:B.white,weight:'700'});
  // scene title
  txt(title,W/2,40,{size:26,color:B.white,align:'center',weight:'700'});
  if(subtitle) txt(subtitle,W/2,54+22,{size:17,color:B.blue,align:'center'});
  // right: Model Monitoring badge
  rbox(W-200,14,190,36,{fill:B.blue+'33',stroke:B.blue,lw:1.5,r:8});
  txt('Model Monitoring',W-105,38,{size:15,color:B.blue,align:'center',weight:'600'});
  ctx.restore();
}

// ── ROBOT (LLM Model character) ──
function robot(x,y,o={}){
  const{s=1,emo='ok',a=1,arm=0}=o;
  ctx.save();ctx.globalAlpha*=a;ctx.translate(x,y);ctx.scale(s,s);
  ctx.lineCap='round';ctx.lineJoin='round';

  // shadow
  ctx.beginPath();ctx.ellipse(0,62,18,5,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,57,93,.1)';ctx.fill();

  // antenna
  ctx.strokeStyle=B.navy;ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(0,-56);ctx.lineTo(0,-72);ctx.stroke();
  ctx.beginPath();ctx.arc(0,-76,6,0,Math.PI*2);
  ctx.fillStyle=B.blue;ctx.fill();ctx.strokeStyle=B.navy;ctx.lineWidth=1.5;ctx.stroke();

  // head
  rbox(-26,-56,52,40,{fill:B.pale,stroke:B.navy,lw:2.5,r:8});
  // visor screen
  rbox(-20,-52,40,22,{fill:B.navy,stroke:B.blue,lw:1.5,r:4});
  // eyes
  const eyeC=emo==='sad'?B.muted:B.blue;
  ctx.beginPath();ctx.arc(-9,-40,5,0,Math.PI*2);ctx.fillStyle=eyeC;ctx.fill();
  ctx.beginPath();ctx.arc(9,-40,5,0,Math.PI*2);ctx.fillStyle=eyeC;ctx.fill();
  // eye shine
  ctx.beginPath();ctx.arc(-7,-42,2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.6)';ctx.fill();
  ctx.beginPath();ctx.arc(11,-42,2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.6)';ctx.fill();
  // mouth
  ctx.strokeStyle=B.blue;ctx.lineWidth=2;
  ctx.beginPath();
  if(emo==='happy')ctx.arc(0,-26,7,0.2,Math.PI-.2);
  else if(emo==='sad')ctx.arc(0,-20,7,Math.PI+.3,2*Math.PI-.3);
  else{ctx.moveTo(-7,-24);ctx.lineTo(7,-24);}
  ctx.stroke();

  // body
  rbox(-22,-14,44,30,{fill:B.pale,stroke:B.navy,lw:2.5,r:6});
  ctx.beginPath();ctx.arc(-8,1,4,0,Math.PI*2);ctx.fillStyle=B.blue;ctx.fill();
  ctx.beginPath();ctx.arc(6,1,4,0,Math.PI*2);ctx.fillStyle=B.green;ctx.fill();
  // "BARCLAYS MODEL" tiny label
  txt('MODEL',0,12,{size:8,color:B.navy,align:'center',weight:'700'});

  // legs
  ctx.strokeStyle=B.navy;ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(-10,16);ctx.lineTo(-14,58);ctx.stroke();
  ctx.beginPath();ctx.moveTo(10,16);ctx.lineTo(14,58);ctx.stroke();

  // arms
  const al=arm||0;
  ctx.beginPath();ctx.moveTo(-22,0);ctx.lineTo(-22-32*Math.cos(al),0-32*Math.sin(al*2));ctx.stroke();
  ctx.beginPath();ctx.moveTo(22,0);ctx.lineTo(22+32*Math.cos(al),0-32*Math.sin(al*2));ctx.stroke();

  ctx.restore();
}

// ── HUMAN (LLM Agent character) ──
function human(x,y,o={}){
  const{s=1,emo='curious',a=1}=o;
  ctx.save();ctx.globalAlpha*=a;ctx.translate(x,y);ctx.scale(s,s);
  ctx.lineCap='round';

  // shadow
  ctx.beginPath();ctx.ellipse(0,66,16,5,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,57,93,.1)';ctx.fill();

  // hair
  ctx.beginPath();ctx.arc(0,-54,24,Math.PI,0);ctx.fillStyle=B.navy;ctx.fill();
  // head
  ctx.beginPath();ctx.arc(0,-54,22,0,Math.PI*2);
  ctx.fillStyle='#FDDDB8';ctx.fill();ctx.strokeStyle=B.navy;ctx.lineWidth=2;ctx.stroke();
  // eyes
  ctx.fillStyle=B.navy;
  ctx.beginPath();ctx.arc(-8,-58,3.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(8,-58,3.5,0,Math.PI*2);ctx.fill();
  // brows
  ctx.strokeStyle=B.navy;ctx.lineWidth=2;
  if(emo==='curious'){
    ctx.beginPath();ctx.moveTo(-13,-67);ctx.quadraticCurveTo(-8,-72,-3,-66);ctx.stroke();
    ctx.beginPath();ctx.moveTo(3,-67);ctx.quadraticCurveTo(8,-72,13,-66);ctx.stroke();
  }
  // mouth
  ctx.beginPath();
  if(emo==='happy'){ctx.arc(0,-46,7,.2,Math.PI-.2);ctx.strokeStyle=B.navy;ctx.lineWidth=2;ctx.stroke();}
  else{ctx.moveTo(-5,-46);ctx.quadraticCurveTo(0,-42,5,-46);ctx.strokeStyle=B.navy;ctx.lineWidth=2;ctx.stroke();}
  // shirt (Barclays blue)
  ctx.beginPath();ctx.moveTo(-14,-32);ctx.lineTo(14,-32);ctx.lineTo(18,20);ctx.lineTo(-18,20);ctx.closePath();
  ctx.fillStyle=B.navy;ctx.fill();
  // tie
  ctx.beginPath();ctx.moveTo(-4,-32);ctx.lineTo(4,-32);ctx.lineTo(2,10);ctx.lineTo(0,16);ctx.lineTo(-2,10);ctx.closePath();
  ctx.fillStyle=B.blue;ctx.fill();
  // arms
  ctx.strokeStyle=B.navy;ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(-14,-20);ctx.lineTo(-34,-5);ctx.stroke();
  ctx.beginPath();ctx.moveTo(14,-20);ctx.lineTo(34,-5);ctx.stroke();
  // legs
  ctx.beginPath();ctx.moveTo(-8,20);ctx.lineTo(-12,62);ctx.stroke();
  ctx.beginPath();ctx.moveTo(8,20);ctx.lineTo(12,62);ctx.stroke();

  ctx.restore();
}

// ── SPEECH BUBBLE ──
function bubble(x,y,w,h,lines,o={}){
  const{fill=B.white,border=B.navy,tc=B.ink,ts=17,tailDir='down',a=1}=o;
  ctx.save();ctx.globalAlpha*=a;
  shadow(x,y,w,h);
  rbox(x,y,w,h,{fill,stroke:border,lw:2,r:14});
  // tail
  ctx.beginPath();
  if(tailDir==='down'){ctx.moveTo(x+36,y+h);ctx.lineTo(x+22,y+h+22);ctx.lineTo(x+58,y+h+2);}
  else{ctx.moveTo(x+36,y);ctx.lineTo(x+22,y-22);ctx.lineTo(x+58,y-2);}
  ctx.fillStyle=fill;ctx.fill();ctx.strokeStyle=border;ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=tc;ctx.font=`600 ${ts}px Caveat`;ctx.textAlign='center';
  (Array.isArray(lines)?lines:[lines]).forEach((l,i)=>ctx.fillText(l,x+w/2,y+ts*1.5+i*(ts+5)));
  ctx.restore();
}

// ── MONITOR ──
function monitor(x,y,w,h,rows,a=1){
  ctx.save();ctx.globalAlpha*=a;
  // stand
  ctx.fillStyle='#334';
  ctx.fillRect(x+w/2-14,y+h,28,18);ctx.fillRect(x+w/2-28,y+h+18,56,7);
  // bezel
  rbox(x,y,w,h,{fill:'#1A1A2E',stroke:'#334',lw:3,r:12});
  // screen
  rbox(x+10,y+10,w-20,h-28,{fill:'#0D0F1A',r:6});
  // status bar
  rbox(x+10,y+10,w-20,22,{fill:B.navy,r:4});
  txt('● BARCLAYS MODEL MONITORING',x+w/2,y+26,{size:12,color:B.blue,align:'center',weight:'700'});
  rows.forEach(([t,c,sy])=>{
    ctx.fillStyle=c||'#94a3b8';
    ctx.font=`400 13px "Courier New", monospace`;ctx.textAlign='left';
    ctx.fillText(t,x+16,y+sy);
  });
  ctx.restore();
}

// ── BLACKBOARD ──
function board(x,y,w,h,a=1){
  ctx.save();ctx.globalAlpha*=a;
  // wood frame
  ctx.beginPath();ctx.roundRect(x-12,y-12,w+24,h+24,8);
  ctx.fillStyle='#5C3D1E';ctx.fill();
  // chalk ledge
  ctx.fillStyle='#7B5233';ctx.fillRect(x-12,y+h+12,w+24,10);
  // board surface
  ctx.beginPath();ctx.roundRect(x,y,w,h,4);
  ctx.fillStyle='#1E3A2A';ctx.fill();
  // chalk dust specks
  for(let i=0;i<20;i++){
    ctx.fillStyle=`rgba(240,236,227,${Math.random()*.08})`;
    ctx.fillRect(x+Math.random()*w,y+h-12,Math.random()*30+5,2);
  }
  ctx.restore();
}

// ── CLOCK ──
function clock(x,y,r,ang,a=1){
  ctx.save();ctx.globalAlpha*=a;
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=B.white;ctx.fill();ctx.strokeStyle=B.navy;ctx.lineWidth=3;ctx.stroke();
  // face ring
  ctx.beginPath();ctx.arc(x,y,r-4,0,Math.PI*2);
  ctx.strokeStyle=B.blue;ctx.lineWidth=1;ctx.stroke();
  for(let i=0;i<12;i++){
    const a2=i/12*Math.PI*2-Math.PI/2;
    const inn=i%3===0?r-14:r-8;
    ctx.beginPath();ctx.moveTo(x+Math.cos(a2)*inn,y+Math.sin(a2)*inn);
    ctx.lineTo(x+Math.cos(a2)*(r-4),y+Math.sin(a2)*(r-4));
    ctx.strokeStyle=i%3===0?B.navy:B.muted;ctx.lineWidth=i%3===0?2.5:1;ctx.stroke();
  }
  // hands
  ctx.strokeStyle=B.navy;ctx.lineWidth=3.5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x,y);
  ctx.lineTo(x+Math.cos(ang-Math.PI/2)*r*.55,y+Math.sin(ang-Math.PI/2)*r*.55);ctx.stroke();
  ctx.lineWidth=2;ctx.strokeStyle=B.blue;
  ctx.beginPath();ctx.moveTo(x,y);
  ctx.lineTo(x+Math.cos(ang*12-Math.PI/2)*r*.78,y+Math.sin(ang*12-Math.PI/2)*r*.78);ctx.stroke();
  ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle=B.red;ctx.fill();
  ctx.restore();
}

// ── DATA TABLE CARD ──
function tableCard(x,y,w,h,title,icon,colorTop,desc,a=1){
  ctx.save();ctx.globalAlpha*=a;
  shadow(x,y,w,h,14);
  rbox(x,y,w,h,{fill:B.white,stroke:colorTop+'44',lw:2,r:14});
  // top stripe
  rbox(x,y,w,60,{fill:colorTop,stroke:null,r:14});
  rbox(x,y+46,w,14,{fill:colorTop,stroke:null,r:0});
  txt(icon,x+w/2,y+26,{size:26,color:B.white,align:'center'});
  txt(title,x+w/2,y+52,{size:19,color:B.white,align:'center',weight:'700'});
  // description pills
  desc.forEach((line,i)=>{
    const ly=y+76+i*52;
    rbox(x+12,ly,w-24,40,{fill:colorTop+'0D',stroke:colorTop+'33',lw:1.5,r:8});
    txt(line,x+w/2,ly+26,{size:16,color:B.ink,align:'center',weight:'600'});
  });
  ctx.restore();
}

// ── THOUGHT ROW ──
function thoughtRow(x,y,w,badge,badgeColor,lines,isLatest,a=1){
  const h=lines.length<=2?74:96;
  ctx.save();ctx.globalAlpha*=a;
  if(isLatest){ctx.shadowColor=badgeColor+'44';ctx.shadowBlur=12;}
  rbox(x,y,w,h,{fill:isLatest?badgeColor+'0D':B.white,stroke:badgeColor+(isLatest?'CC':'44'),lw:isLatest?2.5:1.5,r:12});
  ctx.restore();
  // badge pill
  pill(x+10,y+10,120,26,badgeColor,badge,B.white,13);
  lines.forEach((l,i)=>{
    const isH=l.startsWith('→')||l.startsWith('✓');
    txt(l,x+142,y+28+i*24,{size:isLatest?16:14,color:isH?badgeColor:B.slate,weight:isH?'700':'400'});
  });
}

// ── CHECK ROW ──
function checkRow(x,y,w,label,val,valColor,note,a=1){
  ctx.save();ctx.globalAlpha*=a;
  shadow(x,y,w,82,10);
  rbox(x,y,w,82,{fill:B.white,stroke:'rgba(0,57,93,.06)',lw:1.5,r:10});
  // check
  ctx.strokeStyle=B.green;ctx.lineWidth=3;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x+18,y+28);ctx.lineTo(x+27,y+40);ctx.lineTo(x+44,y+16);ctx.stroke();
  txt(label,x+58,y+30,{size:20,color:B.ink,weight:'600'});
  txt(val,x+w-18,y+30,{size:20,color:valColor,align:'right',weight:'700'});
  txt(note,x+58,y+56,{size:14,color:B.muted});
  ctx.restore();
}

// ── ROOT CAUSE CARD ──
function rcCard(x,y,w,numLabel,numColor,titleTxt,bodyLines,stepRef,a=1){
  const h=bodyLines.length*30+90;
  ctx.save();ctx.globalAlpha*=a;
  shadow(x,y,w,h,14);
  rbox(x,y,w,h,{fill:B.white,stroke:numColor+'55',lw:2,r:14});
  // left accent bar
  ctx.fillStyle=numColor;ctx.beginPath();ctx.roundRect(x,y,6,h,[14,0,0,14]);ctx.fill();
  // number badge
  pill(x+14,y+14,90,28,numColor,numLabel,B.white,14);
  // step ref
  rbox(x+114,y+14,140,28,{fill:numColor+'22',stroke:numColor+'55',lw:1,r:14});
  txt(stepRef,x+184,y+33,{size:12,color:numColor,align:'center',weight:'600'});
  // title
  txt(titleTxt,x+20,y+62,{size:18,color:B.ink,weight:'700'});
  bodyLines.forEach((l,i)=>{
    const isH=l.startsWith('→');
    txt(l,x+20,y+90+i*30,{size:15,color:isH?numColor:B.slate,weight:isH?'600':'400'});
  });
  ctx.restore();
}

// ═══════════════════════════════
// SCENES
// ═══════════════════════════════
const SCENES=[

// ── 0: TITLE 0–6s ──
{start:0,dur:6,title:'Intro',draw(st){
  const p=ease(prog(0.2,.8,st));
  // left navy panel
  ctx.fillStyle=B.navy;ctx.fillRect(0,0,W*.38,H);
  // right paper
  ctx.fillStyle=B.paper;ctx.fillRect(W*.38,0,W*.62,H);
  // blue diagonal accent — thinner, no overlap with text
  ctx.beginPath();ctx.moveTo(W*.38-1,0);ctx.lineTo(W*.38+28,0);ctx.lineTo(W*.38,H);ctx.lineTo(W*.38-1,H);
  ctx.fillStyle=B.blue;ctx.fill();

  // EAGLE large
  ctx.save();ctx.globalAlpha=p*.7;eagle(W*.19,H*.32,3.2);ctx.restore();
  // BARCLAYS wordmark
  ctx.save();ctx.globalAlpha=p;
  txt('BARCLAYS',W*.19,H*.32+100,{size:32,color:B.white,align:'center',weight:'700'});
  txt('Cards & Payments',W*.19,H*.32+136,{size:18,color:B.blue,align:'center'});
  txt('Model Monitoring',W*.19,H*.32+164,{size:18,color:B.blue,align:'center'});
  ctx.restore();

  // right: title content — start further right to clear the diagonal
  ctx.save();ctx.globalAlpha=ease(prog(.4,.8,st));
  const rx=W*.44, rw=W*.52;
  txt('LLM Model',rx+rw/2,H*.22,{size:Math.round(W/20),color:B.navy,align:'center',weight:'700'});
  txt('vs',rx+rw/2,H*.22+Math.round(W/20)*1.2,{size:Math.round(W/24),color:B.blue,align:'center',weight:'400'});
  txt('LLM Agent',rx+rw/2,H*.22+Math.round(W/20)*2.4,{size:Math.round(W/20),color:B.navy,align:'center',weight:'700'});

  // subtitle line

    ['✔','Method','Each box checked independently'],
    ['📊','FICO','Mean dropped 45 pts — reported'],
    ['📊','Product','Xbox/HAW declined — reported'],
    ['📊','Balance','REVL_BAL_AMT fell — reported'],
    ['📊','Txn','Purchase frequency down — reported'],
    ['💬','Output','"Dimensions checked. Done."'],
    ['❌','Root cause','Unknown — not identified'],
  ];
  lrows.forEach(([icon,label,detail],i)=>{
    const ry=cy0+80+i*66;
    if(i%2===0){ctx.fillStyle='rgba(0,57,93,.03)';ctx.fillRect(lx+8,ry-8,cw-16,58);}
    txt(icon,lx+24,ry+20,{size:18,align:'center'});
    txt(label,lx+50,ry+14,{size:15,color:B.navy,weight:'700'});
    txt(detail,lx+50,ry+36,{size:15,color:i>=6?B.red:B.slate});
  });
  ctx.restore();

  // RIGHT card
  ctx.save();ctx.globalAlpha=rp;
  shadow(rx,cy0,cw,ch,14);
  rbox(rx,cy0,cw,ch,{fill:B.white,stroke:B.green+'55',lw:2,r:14});
  rbox(rx,cy0,cw,62,{fill:B.green,stroke:null,r:14});rbox(rx,cy0+48,cw,14,{fill:B.green,r:0});
  ctx.fillStyle='rgba(255,255,255,.3)';ctx.fillRect(rx,cy0+62,cw,3);
  human(rx+cw*.5,cy0-36,{s:.7,emo:'happy'});
  txt('🧠  LLM Agent',rx+cw/2,cy0+38,{size:24,color:B.white,align:'center',weight:'700'});
  const rrows=[
    ['📂','Input','ASP table + Txn table + Macro/Seasonal'],
    ['🔍','Method','Self-directed 5-query investigation'],
    ['🟡','RC #1','Composition change — chargeoff attrition'],
    ['🟣','RC #2','Seasonal baseline wedge (Dec vs Mar)'],
    ['🟢','RC #3','Wallet rationalisation & spend concentration'],
    ['💡','FICO','Systematic macro shift — flagged separately'],
    ['💬','Output','"3 root causes with cross-table evidence."'],
    ['✅','Action','Recalibrate baseline. Monitor FICO.'],
  ];
  rrows.forEach(([icon,label,detail],i)=>{
    const ry=cy0+80+i*66;
    if(i%2===0){ctx.fillStyle='rgba(39,174,96,.04)';ctx.fillRect(rx+8,ry-8,cw-16,58);}
    txt(icon,rx+24,ry+20,{size:18,align:'center'});
    txt(label,rx+50,ry+14,{size:15,color:B.green,weight:'700'});
    txt(detail,rx+50,ry+36,{size:15,color:i>=6?B.green:B.slate,weight:i>=6?'600':'400'});
  });
  ctx.restore();
}},

];

// ═══════════════════════════════
// PLAYBACK
// ═══════════════════════════════
function curScene(){for(let i=SCENES.length-1;i>=0;i--)if(T>=SCENES[i].start)return i;return 0;}

function frame(ts){
  if(!lastTs)lastTs=ts;
  const dt=(ts-lastTs)/1000;lastTs=ts;
  if(!paused)T=Math.min(T+dt,TOTAL);
  clr();
  const si=curScene(),sc=SCENES[si];
  sc.draw(T-sc.start);
  // subtle blend with next
  if(si<SCENES.length-1){
    const ns=SCENES[si+1];
    if(T>=ns.start-.4){
      const bl=clamp((T-ns.start+.4)/.4,0,1);
      ctx.save();ctx.globalAlpha=bl;clr();ns.draw(0);ctx.restore();
    }
  }
  // ui update
  const pct=(T/TOTAL*100).toFixed(1);
  document.getElementById('tl-fill').style.width=pct+'%';
  const m=Math.floor(T/60),s=Math.floor(T%60);
  document.getElementById('lbl').textContent=`${m}:${s.toString().padStart(2,'0')}`;
  document.getElementById('stitle').textContent=sc.title||'';
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i===si));
  if(T<TOTAL)requestAnimationFrame(frame);
  else{paused=true;document.getElementById('playBtn').textContent='▶';}
}

// controls
document.getElementById('playBtn').addEventListener('click',()=>{
  if(T>=TOTAL){T=0;paused=false;lastTs=null;requestAnimationFrame(frame);}
  else{paused=!paused;document.getElementById('playBtn').textContent=paused?'▶':'⏸';
    if(!paused){lastTs=null;requestAnimationFrame(frame);}}
});
document.getElementById('rstBtn').addEventListener('click',()=>{
  T=0;paused=false;lastTs=null;document.getElementById('playBtn').textContent='⏸';requestAnimationFrame(frame);
});
document.getElementById('tl-wrap').addEventListener('click',e=>{
  const r=e.currentTarget.getBoundingClientRect();
  T=(e.clientX-r.left)/r.width*TOTAL;lastTs=null;
  if(paused){paused=false;document.getElementById('playBtn').textContent='⏸';requestAnimationFrame(frame);}
});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();document.getElementById('playBtn').click();}
  if(e.code==='KeyR')document.getElementById('rstBtn').click();
  if(e.code==='ArrowRight'){T=Math.min(T+4,TOTAL);lastTs=null;}
  if(e.code==='ArrowLeft'){T=Math.max(T-4,0);lastTs=null;}
});

// dots
const dc=document.getElementById('dots');
SCENES.forEach((sc,i)=>{
  const d=document.createElement('div');d.className='dot';d.title=sc.title;
  d.addEventListener('click',()=>{T=sc.start+.01;lastTs=null;paused=false;
    document.getElementById('playBtn').textContent='⏸';requestAnimationFrame(frame);});
  dc.appendChild(d);
});

requestAnimationFrame(frame);
</script>
