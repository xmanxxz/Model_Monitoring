<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Barclays — Can AI Investigate Itself?</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#001a2e}
/* Fixed-size canvas centered and scaled to fit any screen */
#stage{
  position:fixed;top:0;left:0;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
#cvs-wrap{
  position:relative;
  /* JS sets width/height and transform */
  flex-shrink:0;
}
canvas{display:block;border-radius:0}
/* UI bar rendered in real pixels, below the scaled canvas */
#ui{
  position:fixed;bottom:0;left:0;right:0;height:44px;
  background:rgba(0,18,30,.97);
  border-top:1px solid rgba(0,174,239,.2);
  display:flex;align-items:center;justify-content:center;gap:12px;z-index:200
}
.btn{background:none;border:1.5px solid rgba(255,255,255,.25);color:rgba(255,255,255,.8);
  font-family:'DM Sans',sans-serif;font-size:13px;padding:5px 16px;border-radius:30px;cursor:pointer;transition:all .2s}
.btn:hover{background:rgba(0,174,239,.2);border-color:#00AEEF;color:white}
#tl-wrap{width:220px;height:4px;background:rgba(255,255,255,.15);border-radius:3px;cursor:pointer;flex-shrink:0}
#tl-fill{height:100%;background:#00AEEF;border-radius:3px;width:0%;transition:width .15s linear}
#lbl{font-family:'DM Sans',sans-serif;font-size:12px;color:rgba(255,255,255,.5);min-width:36px}
#stitle{font-family:'DM Sans',sans-serif;font-size:12px;color:rgba(255,255,255,.6);min-width:160px;text-align:center}
#dots{position:fixed;bottom:52px;right:16px;display:flex;gap:6px;z-index:200}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:all .2s}
.dot.on{background:#00AEEF;transform:scale(1.4)}
/* Caption rendered INSIDE the scaled canvas wrapper so it scales too */
#caption{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;justify-content:center;pointer-events:none;z-index:10;padding:0 12px 6px
}
#caption-inner{
  width:100%;background:rgba(0,18,34,0.92);
  border:1px solid rgba(0,174,239,0.25);border-radius:8px;
  padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:11px;
  color:rgba(255,255,255,.82);line-height:1.5;text-align:left;
  backdrop-filter:blur(6px);box-shadow:0 4px 20px rgba(0,0,0,.4)
}
#caption-inner em{color:#00AEEF;font-style:normal;font-weight:600}
#caption-inner strong{color:#fff;font-weight:700}
</style>
</head>
<body>
<div id="stage">
  <div id="cvs-wrap">
    <canvas id="c"></canvas>
    <div id="caption"><div id="caption-inner"></div></div>
  </div>
</div>
<div id="dots"></div>
<div id="ui">
  <button class="btn" id="playBtn">&#9654;</button>
  <button class="btn" id="rstBtn">&#8617;</button>
  <button class="btn" id="speedBtn">1x</button>
  <div id="tl-wrap"><div id="tl-fill"></div></div>
  <div id="lbl">0:00</div>
  <div id="stitle">Intro</div>
</div>
<script>
const cvs=document.getElementById('c');
const ctx=cvs.getContext('2d');
// Fixed virtual resolution — all scene coordinates use these
const VW=1280, VH=640;
const W=VW, H=VH;
const S=1; // All sizes already in virtual pixels

function fitCanvas(){
  const UI=44;
  const availW=innerWidth;
  const availH=innerHeight-UI;
  const scale=Math.min(availW/VW, availH/VH);
  const wrap=document.getElementById('cvs-wrap');
  wrap.style.width=VW+'px';
  wrap.style.height=VH+'px';
  wrap.style.transform='scale('+scale+')';
  wrap.style.transformOrigin='top left';
  // Center horizontally
  const offsetX=(availW - VW*scale)/2;
  const offsetY=(availH - VH*scale)/2;
  wrap.style.position='fixed';
  wrap.style.left=offsetX+'px';
  wrap.style.top=offsetY+'px';
}
cvs.width=VW;
cvs.height=VH;
fitCanvas();
addEventListener('resize',fitCanvas);

let T=0,paused=true,lastTs=null;
const TOTAL=192;
const ease=x=>1-Math.pow(1-x,3);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const prog=(s,d,t)=>clamp((t-s)/d,0,1);

const B={
  navy:'#00395D',blue:'#00AEEF',mid:'#005B8C',pale:'#E8F4FB',
  white:'#FFFFFF',paper:'#FAFAF8',ink:'#1A2B3C',slate:'#4A6070',
  muted:'#8BA5B5',red:'#D0021B',amber:'#F5A623',green:'#27AE60',purple:'#7B2D8B',
};

function clr(){
  ctx.fillStyle=B.paper;ctx.fillRect(0,0,W,H);
  // very subtle dot-grid instead of lines
  ctx.fillStyle='rgba(0,57,93,.07)';
  for(let gx=40;gx<W;gx+=40){for(let gy=40;gy<H;gy+=40){
    ctx.beginPath();ctx.arc(gx,gy,1,0,Math.PI*2);ctx.fill();
  }}
}

function txt(t,x,y,o={}){
  const{size=18,color=B.ink,align='left',weight='400',alpha=1}=o;
  ctx.save();ctx.globalAlpha*=alpha;
  ctx.font=`${weight} ${Math.max(8,Math.round(size))}px 'DM Sans'`;
  ctx.fillStyle=color;ctx.textAlign=align;
  t.split('\n').forEach((l,i)=>ctx.fillText(l,x,y+i*(size*1.35)));
  ctx.restore();
}

function rbox(x,y,w,h,o={}){
  const{fill=B.white,stroke=null,lw=2,r=10,a=1}=o;
  ctx.save();ctx.globalAlpha*=a;
  ctx.beginPath();ctx.roundRect(x,y,Math.max(1,w),Math.max(1,h),r);
  ctx.fillStyle=fill;ctx.fill();
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();}
  ctx.restore();
}

function shadow(x,y,w,h,r=12){
  ctx.save();ctx.shadowColor='rgba(0,57,93,.14)';ctx.shadowBlur=18;ctx.shadowOffsetY=4;
  ctx.beginPath();ctx.roundRect(x,y,Math.max(1,w),Math.max(1,h),r);
  ctx.fillStyle=B.white;ctx.fill();ctx.restore();
}

function pill(x,y,w,h,fill,label,labelColor,size){
  labelColor=labelColor||B.white;size=size||15;
  rbox(x,y,w,h,{fill,r:h/2/S});
  txt(label,x+w/2,y+h/2+size*.38,{size,color:labelColor,align:'center',weight:'700'});
}

function eagle(x,y,sc,a){
  sc=sc||1;a=a||1;
  const es=sc*S;
  ctx.save();ctx.globalAlpha*=a;ctx.translate(x,y);ctx.scale(es,es);
  ctx.fillStyle=B.blue;
  ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(-28,-8,-46,4,-40,20);
  ctx.bezierCurveTo(-32,14,-18,10,0,16);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(28,-8,46,4,40,20);
  ctx.bezierCurveTo(32,14,18,10,0,16);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.ellipse(0,10,8,14,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(0,-4,6,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function topbar(title,subtitle,a){
  subtitle=subtitle||'';a=a||1;
  const bh=56*S;
  ctx.save();ctx.globalAlpha*=a;
  ctx.fillStyle=B.navy;ctx.fillRect(0,0,W,bh);
  ctx.fillStyle=B.blue;ctx.fillRect(0,bh-2*S,W,2*S);
  txt('BARCLAYS',28*S,bh*.7,{size:14,color:B.white,weight:'700'});
  txt(title,W/2,bh*.68,{size:18,color:B.white,align:'center',weight:'700'});
  if(subtitle)txt(subtitle,W/2,bh+16*S,{size:12,color:B.blue,align:'center'});
  const bw=160*S,bht=26*S;
  rbox(W-bw-10*S,bh/2-bht/2,bw,bht,{fill:B.blue+'33',stroke:B.blue,lw:1,r:6});
  txt('Model Monitoring',W-bw/2-10*S,bh/2+4*S,{size:11,color:B.blue,align:'center',weight:'600'});
  ctx.restore();
}
const TB=()=>54;


function robot(x,y,o){
  o=o||{};
  const{s=1,emo='ok',a=1,arm=0}=o;
  const rs=s*S;
  ctx.save();ctx.globalAlpha*=a;ctx.translate(x,y);ctx.scale(rs,rs);
  ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.ellipse(0,62,18,5,0,0,Math.PI*2);ctx.fillStyle='rgba(0,57,93,.1)';ctx.fill();
  ctx.strokeStyle=B.navy;ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(0,-56);ctx.lineTo(0,-72);ctx.stroke();
  ctx.beginPath();ctx.arc(0,-76,6,0,Math.PI*2);ctx.fillStyle=B.blue;ctx.fill();
  ctx.strokeStyle=B.navy;ctx.lineWidth=1.5;ctx.stroke();
  rbox(-26,-56,52,40,{fill:B.pale,stroke:B.navy,lw:2.5,r:8});
  rbox(-20,-52,40,22,{fill:B.navy,stroke:B.blue,lw:1.5,r:4});
  const eyeC=emo==='sad'?B.muted:B.blue;
  ctx.beginPath();ctx.arc(-9,-40,5,0,Math.PI*2);ctx.fillStyle=eyeC;ctx.fill();
  ctx.beginPath();ctx.arc(9,-40,5,0,Math.PI*2);ctx.fillStyle=eyeC;ctx.fill();
  ctx.beginPath();ctx.arc(-7,-42,2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.6)';ctx.fill();
  ctx.beginPath();ctx.arc(11,-42,2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.6)';ctx.fill();
  ctx.strokeStyle=B.blue;ctx.lineWidth=2;ctx.beginPath();
  if(emo==='happy')ctx.arc(0,-26,7,0.2,Math.PI-.2);
  else if(emo==='sad')ctx.arc(0,-20,7,Math.PI+.3,2*Math.PI-.3);
  else{ctx.moveTo(-7,-24);ctx.lineTo(7,-24);}
  ctx.stroke();
  rbox(-22,-14,44,30,{fill:B.pale,stroke:B.navy,lw:2.5,r:6});
  ctx.beginPath();ctx.arc(-8,1,4,0,Math.PI*2);ctx.fillStyle=B.blue;ctx.fill();
  ctx.beginPath();ctx.arc(6,1,4,0,Math.PI*2);ctx.fillStyle=B.green;ctx.fill();
  ctx.strokeStyle=B.navy;ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(-10,16);ctx.lineTo(-14,58);ctx.stroke();
  ctx.beginPath();ctx.moveTo(10,16);ctx.lineTo(14,58);ctx.stroke();
  const al=arm||0;
  ctx.beginPath();ctx.moveTo(-22,0);ctx.lineTo(-22-32*Math.cos(al),-32*Math.sin(al*2));ctx.stroke();
  ctx.beginPath();ctx.moveTo(22,0);ctx.lineTo(22+32*Math.cos(al),-32*Math.sin(al*2));ctx.stroke();
  ctx.restore();
}

function human(x,y,o){
  o=o||{};
  const{s=1,emo='curious',a=1}=o;
  const hs=s*S;
  ctx.save();ctx.globalAlpha*=a;ctx.translate(x,y);ctx.scale(hs,hs);
  ctx.lineCap='round';
  ctx.beginPath();ctx.ellipse(0,66,16,5,0,0,Math.PI*2);ctx.fillStyle='rgba(0,57,93,.1)';ctx.fill();
  ctx.beginPath();ctx.arc(0,-54,24,Math.PI,0);ctx.fillStyle=B.navy;ctx.fill();
  ctx.beginPath();ctx.arc(0,-54,22,0,Math.PI*2);ctx.fillStyle='#FDDDB8';ctx.fill();
  ctx.strokeStyle=B.navy;ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=B.navy;
  ctx.beginPath();ctx.arc(-8,-58,3.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(8,-58,3.5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=B.navy;ctx.lineWidth=2;
  if(emo==='curious'){
    ctx.beginPath();ctx.moveTo(-13,-67);ctx.quadraticCurveTo(-8,-72,-3,-66);ctx.stroke();
    ctx.beginPath();ctx.moveTo(3,-67);ctx.quadraticCurveTo(8,-72,13,-66);ctx.stroke();
  }
  ctx.beginPath();
  if(emo==='happy'){ctx.arc(0,-46,7,.2,Math.PI-.2);ctx.strokeStyle=B.navy;ctx.lineWidth=2;ctx.stroke();}
  else{ctx.moveTo(-5,-46);ctx.quadraticCurveTo(0,-42,5,-46);ctx.strokeStyle=B.navy;ctx.lineWidth=2;ctx.stroke();}
  ctx.beginPath();ctx.moveTo(-14,-32);ctx.lineTo(14,-32);ctx.lineTo(18,20);ctx.lineTo(-18,20);ctx.closePath();
  ctx.fillStyle=B.navy;ctx.fill();
  ctx.beginPath();ctx.moveTo(-4,-32);ctx.lineTo(4,-32);ctx.lineTo(2,10);ctx.lineTo(0,16);ctx.lineTo(-2,10);ctx.closePath();
  ctx.fillStyle=B.blue;ctx.fill();
  ctx.strokeStyle=B.navy;ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(-14,-20);ctx.lineTo(-34,-5);ctx.stroke();
  ctx.beginPath();ctx.moveTo(14,-20);ctx.lineTo(34,-5);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-8,20);ctx.lineTo(-12,62);ctx.stroke();
  ctx.beginPath();ctx.moveTo(8,20);ctx.lineTo(12,62);ctx.stroke();
  ctx.restore();
}

function bubble(x,y,w,h,lines,o){
  o=o||{};
  const{fill=B.white,border=B.navy,tc=B.ink,ts=15,tailDir='down',a=1}=o;
  const bw=w*S,bh=h*S;
  ctx.save();ctx.globalAlpha*=a;
  shadow(x,y,bw,bh);
  rbox(x,y,bw,bh,{fill,stroke:border,lw:1.5,r:12});
  ctx.beginPath();
  if(tailDir==='down'){ctx.moveTo(x+28*S,y+bh);ctx.lineTo(x+16*S,y+bh+16*S);ctx.lineTo(x+44*S,y+bh+2*S);}
  else{ctx.moveTo(x+28*S,y);ctx.lineTo(x+16*S,y-16*S);ctx.lineTo(x+44*S,y-2*S);}
  ctx.fillStyle=fill;ctx.fill();ctx.strokeStyle=border;ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=tc;
  ctx.font=`600 ${Math.max(8,Math.round(ts*S))}px 'DM Sans'`;ctx.textAlign='center';
  (Array.isArray(lines)?lines:[lines]).forEach((l,i)=>ctx.fillText(l,x+bw/2,y+ts*S*1.4+i*(ts*S+3*S)));
  ctx.restore();
}

function monitor(x,y,w,h,rows,a){
  a=a||1;
  const mw=w*S,mh=h*S;
  ctx.save();ctx.globalAlpha*=a;
  ctx.fillStyle='#334';
  ctx.fillRect(x+mw/2-11*S,y+mh,20*S,13*S);ctx.fillRect(x+mw/2-22*S,y+mh+13*S,44*S,5*S);
  rbox(x,y,mw,mh,{fill:'#1A1A2E',stroke:'#334',lw:2,r:10});
  rbox(x+7*S,y+7*S,mw-14*S,mh-20*S,{fill:'#0D0F1A',r:5});
  rbox(x+7*S,y+7*S,mw-14*S,17*S,{fill:B.navy,r:4});
  txt('BARCLAYS MODEL MONITORING',x+mw/2,y+20*S,{size:9,color:B.blue,align:'center',weight:'700'});
  const sy=mh/h;
  rows.forEach(function(r2){
    var t=r2[0],c=r2[1],ry=r2[2];
    ctx.fillStyle=c||'#94a3b8';
    ctx.font=`400 ${Math.max(8,Math.round(10*S))}px "Courier New",monospace`;
    ctx.textAlign='left';ctx.fillText(t,x+10*S,y+ry*sy);
  });
  ctx.restore();
}

function board(x,y,w,h,a){
  a=a||1;
  ctx.save();ctx.globalAlpha*=a;
  ctx.beginPath();ctx.roundRect(x-9,y-9,w+18,h+18,6);ctx.fillStyle='#5C3D1E';ctx.fill();
  ctx.fillStyle='#7B5233';ctx.fillRect(x-9*S,y+h+9*S,w+18*S,7*S);
  ctx.beginPath();ctx.roundRect(x,y,w,h,3);ctx.fillStyle='#1E3A2A';ctx.fill();
  for(var i=0;i<12;i++){
    ctx.fillStyle='rgba(240,236,227,'+(Math.random()*.07)+')';
    ctx.fillRect(x+Math.random()*w,y+h-9*S,Math.random()*22*S+3*S,2*S);
  }
  ctx.restore();
}

function clock(x,y,r,ang,a){
  a=a||1;
  const cr=r*S;
  ctx.save();ctx.globalAlpha*=a;
  ctx.beginPath();ctx.arc(x,y,cr,0,Math.PI*2);ctx.fillStyle=B.white;ctx.fill();
  ctx.strokeStyle=B.navy;ctx.lineWidth=2*S;ctx.stroke();
  for(var i=0;i<12;i++){
    const a2=i/12*Math.PI*2-Math.PI/2;
    const inn=i%3===0?cr-10*S:cr-5*S;
    ctx.beginPath();ctx.moveTo(x+Math.cos(a2)*inn,y+Math.sin(a2)*inn);
    ctx.lineTo(x+Math.cos(a2)*(cr-2*S),y+Math.sin(a2)*(cr-2*S));
    ctx.strokeStyle=i%3===0?B.navy:B.muted;ctx.lineWidth=i%3===0?1.5*S:1;ctx.stroke();
  }
  ctx.strokeStyle=B.navy;ctx.lineWidth=2.5*S;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+Math.cos(ang-Math.PI/2)*cr*.55,y+Math.sin(ang-Math.PI/2)*cr*.55);ctx.stroke();
  ctx.lineWidth=1.5*S;ctx.strokeStyle=B.blue;
  ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+Math.cos(ang*12-Math.PI/2)*cr*.78,y+Math.sin(ang*12-Math.PI/2)*cr*.78);ctx.stroke();
  ctx.beginPath();ctx.arc(x,y,3*S,0,Math.PI*2);ctx.fillStyle=B.red;ctx.fill();
  ctx.restore();
}

function tableCard(x,y,w,h,title,icon,colorTop,desc,a){
  a=a||1;
  ctx.save();ctx.globalAlpha*=a;
  const th=50*S,rowH=38*S,pad=10*S;
  shadow(x,y,w,h,10);
  rbox(x,y,w,h,{fill:B.white,stroke:colorTop+'44',lw:1.5,r:10});
  rbox(x,y,w,th,{fill:colorTop,stroke:null,r:10});rbox(x,y+th-7*S,w,7*S,{fill:colorTop,r:0});
  txt(icon,x+w/2,y+th*.5,{size:18,color:B.white,align:'center'});
  txt(title,x+w/2,y+th*.88,{size:13,color:B.white,align:'center',weight:'700'});
  desc.forEach(function(line,i){
    const ly=y+th+pad+i*(rowH+5*S);
    rbox(x+pad,ly,w-pad*2,rowH,{fill:colorTop+'0D',stroke:colorTop+'33',lw:1,r:6});
    txt(line,x+w/2,ly+rowH*.65,{size:12,color:B.ink,align:'center',weight:'600'});
  });
  ctx.restore();
}

function thoughtRow(x,y,w,h,badge,badgeColor,lines,isLatest,a){
  a=a||1;
  ctx.save();ctx.globalAlpha*=a;
  if(isLatest){ctx.shadowColor=badgeColor+'44';ctx.shadowBlur=8*S;}
  rbox(x,y,w,h,{fill:isLatest?badgeColor+'0D':B.white,stroke:badgeColor+(isLatest?'CC':'44'),lw:isLatest?2:1.5,r:8});
  ctx.restore();
  const bw=94*S,bh=20*S,bp=8*S;
  pill(x+bp,y+bp,bw,bh,badgeColor,badge,B.white,10);
  const tx=x+bw+bp*2+3*S;
  const lh=h/(lines.length+1);
  lines.forEach(function(l,i){
    const isH=l.startsWith('→')||l.startsWith('\u2713');
    txt(l,tx,y+lh*(i+1)+3*S,{size:isLatest?12:10,color:isH?badgeColor:B.slate,weight:isH?'700':'400'});
  });
}

function checkRow(x,y,w,h,label,val,valColor,note,a){
  a=a||1;
  ctx.save();ctx.globalAlpha*=a;
  shadow(x,y,w,h,7);
  rbox(x,y,w,h,{fill:B.white,stroke:'rgba(0,57,93,.06)',lw:1.5,r:7});
  const cx2=x+12*S,cy2=y+h*.38;
  ctx.strokeStyle=B.green;ctx.lineWidth=2*S;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(cx2,cy2);ctx.lineTo(cx2+7*S,cy2+9*S);ctx.lineTo(cx2+20*S,cy2-9*S);ctx.stroke();
  txt(label,x+40*S,y+h*.36,{size:13,color:B.ink,weight:'600'});
  txt(val,x+w-12*S,y+h*.36,{size:13,color:valColor,align:'right',weight:'700'});
  txt(note,x+40*S,y+h*.72,{size:10,color:B.muted});
  ctx.restore();
}

function rcCard(x,y,w,h,numLabel,numColor,titleTxt,bodyLines,stepRef,a){
  a=a||1;
  ctx.save();ctx.globalAlpha*=a;
  shadow(x,y,w,h,10);
  rbox(x,y,w,h,{fill:B.white,stroke:numColor+'55',lw:1.5,r:10});
  ctx.fillStyle=numColor;ctx.beginPath();ctx.roundRect(x,y,5*S,h,[10*S,0,0,10*S]);ctx.fill();
  const bw=72*S,bh=20*S,pad=10*S;
  pill(x+pad,y+pad,bw,bh,numColor,numLabel,B.white,10);
  rbox(x+bw+pad*2,y+pad,100*S,bh,{fill:numColor+'22',stroke:numColor+'55',lw:1,r:8});
  txt(stepRef,x+bw+pad*2+50*S,y+pad+bh*.72,{size:9,color:numColor,align:'center',weight:'600'});
  txt(titleTxt,x+pad,y+h*.36,{size:13,color:B.ink,weight:'700'});
  const lh=(h*.52)/bodyLines.length;
  bodyLines.forEach(function(l,i){
    const isH=l.startsWith('→');
    txt(l,x+pad,y+h*.44+i*lh,{size:11,color:isH?numColor:B.slate,weight:isH?'600':'400'});
  });
  ctx.restore();
}


// ── layout helper: draw inside a rect using local (0,0)-(lw,lh) coords ──
function region(rx,ry,rw,rh,fn){
  ctx.save();
  ctx.beginPath();ctx.rect(rx,ry,rw,rh);ctx.clip();
  ctx.translate(rx,ry);
  fn(rw,rh);
  ctx.restore();
}
function label(t,x,y,o){txt(t,x,y,o);}

    ctx.strokeStyle=B.blue+'44';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(60,74);ctx.lineTo(lw-60,74);ctx.stroke();
    ctx.restore();

    // Tile row: 80 .. 280
    const tiles=[
      {label:'Root Causes Found',model:'0 \u2014 not identified',agent:'3 with evidence',icon:'\uD83D\uDD0D',delay:.3,color:B.blue},
      {label:'Data Sources Used',model:'Prompted only',agent:'3 tables, self-directed',icon:'\uD83D\uDCCA',delay:.9,color:B.purple},
      {label:'Recommended Action',model:'Unclear',agent:'Recalibrate baseline',icon:'\u2705',delay:1.5,color:B.green},
    ];
    const tileW=Math.floor((lw-80)/3)-10, tileH=190, tileY=80;
    tiles.forEach(function(tile,i){
      const tp2=ease(prog(tile.delay,.6,st));
      ctx.save();ctx.globalAlpha=tp2;
      const tx=40+i*(tileW+10);
      ctx.fillStyle='rgba(255,255,255,.06)';ctx.beginPath();ctx.roundRect(tx,tileY,tileW,tileH,8);ctx.fill();
      ctx.strokeStyle=tile.color+'66';ctx.lineWidth=1.5;ctx.stroke();
      ctx.fillStyle=tile.color;ctx.fillRect(tx,tileY,tileW,3);
      txt(tile.icon,tx+tileW/2,tileY+32,{size:20,color:B.white,align:'center'});
      txt(tile.label,tx+tileW/2,tileY+56,{size:10,color:B.muted,align:'center',weight:'600'});
      ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(tx+14,tileY+68);ctx.lineTo(tx+tileW-14,tileY+68);ctx.stroke();
      // agent first
      txt('\uD83E\uDDE0 Agent:',tx+14,tileY+86,{size:9,color:tile.color,weight:'700'});
      txt(tile.agent,tx+14,tileY+104,{size:11,color:tile.color,weight:'700'});
      // model second
      txt('\uD83E\uDD16 Model:',tx+14,tileY+130,{size:9,color:'rgba(255,255,255,.35)',weight:'600'});
      txt(tile.model,tx+14,tileY+148,{size:11,color:'rgba(255,100,100,.85)',weight:'700'});
      ctx.restore();
    });

    // Banner: 282 .. 356
    const bP=ease(prog(2.4,.6,st));
    const banY=282, banH=66;
    ctx.save();ctx.globalAlpha=bP;
    rbox(40,banY,lw-80,banH,{fill:B.blue+'28',stroke:B.blue,lw:1.5,r:10});
    txt('\uD83D\uDCA1  The Difference',58,banY+20,{size:12,color:B.blue,weight:'700'});
    txt('Same alert. Same data. The Agent found 3 root causes the Model never considered',58,banY+38,{size:11,color:B.white});
    txt('and delivered a clear action: recalibrate baseline. This is what reasoning looks like.',58,banY+54,{size:11,color:'rgba(255,255,255,.65)'});
    ctx.restore();

    // Outcomes: 360 .. 460
    const outcomes=[
      {icon:'\u23F1',label:'Speed',desc:'Minutes vs hours for root cause triage',delay:3.2},
      {icon:'\uD83D\uDCB0',label:'Cost Efficiency',desc:'No manual analyst investigation needed',delay:3.9},
    ];
    const oY=358, oH=86, oW=Math.floor((lw-100)/2);
    outcomes.forEach(function(o,i){
      const op=ease(prog(o.delay,.5,st));
      ctx.save();ctx.globalAlpha=op;
      const ox=40+i*(oW+20);
      rbox(ox,oY,oW,oH,{fill:'rgba(255,255,255,.06)',stroke:'rgba(255,255,255,.12)',lw:1,r:8});
      txt(o.icon,ox+24,oY+oH*.52,{size:18,color:B.white});
      txt(o.label,ox+52,oY+oH*.36,{size:12,color:B.blue,weight:'700'});
      txt(o.desc,ox+52,oY+oH*.62,{size:10,color:'rgba(255,255,255,.5)'});
      ctx.restore();
    });

    // Wordmark
    ctx.save();ctx.globalAlpha=ease(prog(6,.4,st))*.6;
    txt('BARCLAYS',lw-60,lh-14,{size:12,color:B.white,weight:'700',align:'center'});
    ctx.restore();
  });
}},

];

// CAPTIONS
// ══════════════════════════════════════
const CAPTIONS=[

let lastSi=-1;
function updateCaption(si){
  if(si===lastSi)return;
  lastSi=si;
  document.getElementById('caption-inner').innerHTML=CAPTIONS[si]||'';
}

// ══════════════════════════════════════
// PLAYBACK
// ══════════════════════════════════════
function curScene(){for(let i=SCENES.length-1;i>=0;i--)if(T>=SCENES[i].start)return i;return 0;}

function frame(ts){
  if(!lastTs)lastTs=ts;
  const dt=(ts-lastTs)/1000;lastTs=ts;
  if(!paused)T=Math.min(T+dt*SPEED,TOTAL);
  clr();
  const si=curScene(),sc=SCENES[si];
  sc.draw(T-sc.start);
  if(si<SCENES.length-1){
    const ns=SCENES[si+1];
    if(T>=ns.start-.4){
      const bl=clamp((T-ns.start+.4)/.4,0,1);
      ctx.save();ctx.globalAlpha=bl;clr();ns.draw(0);ctx.restore();
    }
  }
  document.getElementById('tl-fill').style.width=(T/TOTAL*100).toFixed(1)+'%';
  const m=Math.floor(T/60),s=Math.floor(T%60);
  document.getElementById('lbl').textContent=m+':'+(s<10?'0':'')+s;
  document.getElementById('stitle').textContent=sc.title||'';
  document.querySelectorAll('.dot').forEach(function(d,i){d.classList.toggle('on',i===si);});
  updateCaption(si);
  if(T<TOTAL)requestAnimationFrame(frame);
  else{paused=true;document.getElementById('playBtn').textContent='\u25B6';}
}

document.getElementById('playBtn').addEventListener('click',function(){
  if(T>=TOTAL){T=0;paused=false;lastTs=null;document.getElementById('playBtn').textContent='\u23F8';requestAnimationFrame(frame);}
  else{paused=!paused;document.getElementById('playBtn').textContent=paused?'\u25B6':'\u23F8';
    if(!paused){lastTs=null;requestAnimationFrame(frame);}}
});
let SPEED=1.0;
const SPEEDS=[0.5,0.75,1.0,1.5,2.0];
let speedIdx=2;
document.getElementById('speedBtn').addEventListener('click',function(){
  speedIdx=(speedIdx+1)%SPEEDS.length;SPEED=SPEEDS[speedIdx];
  document.getElementById('speedBtn').textContent=SPEED+'x';
});
document.getElementById('rstBtn').addEventListener('click',function(){
  T=0;paused=false;lastTs=null;document.getElementById('playBtn').textContent='\u23F8';requestAnimationFrame(frame);
});
document.getElementById('tl-wrap').addEventListener('click',function(e){
  const r=e.currentTarget.getBoundingClientRect();
  T=(e.clientX-r.left)/r.width*TOTAL;lastTs=null;
  if(paused){paused=false;document.getElementById('playBtn').textContent='\u23F8';requestAnimationFrame(frame);}
});
document.addEventListener('keydown',function(e){
  if(e.code==='Space'){e.preventDefault();document.getElementById('playBtn').click();}
  if(e.code==='KeyR')document.getElementById('rstBtn').click();
  if(e.code==='ArrowRight'){T=Math.min(T+SCENES[Math.min(curScene()+1,SCENES.length-1)].start+.01,TOTAL);lastTs=null;if(paused){paused=false;document.getElementById('playBtn').textContent='\u23F8';requestAnimationFrame(frame);}}
  if(e.code==='ArrowLeft'){const si=curScene();T=si>0?SCENES[si-1].start+.01:0;lastTs=null;if(paused){paused=false;document.getElementById('playBtn').textContent='\u23F8';requestAnimationFrame(frame);}}
});
const dc=document.getElementById('dots');
SCENES.forEach(function(sc,i){
  const d=document.createElement('div');d.className='dot';d.title=sc.title;
  d.addEventListener('click',function(){T=sc.start+.01;lastTs=null;paused=false;
    document.getElementById('playBtn').textContent='\u23F8';requestAnimationFrame(frame);});
  dc.appendChild(d);
});

// Draw first frame paused
(function(){
  clr();
  SCENES[0].draw(0);
  updateCaption(0);
  document.getElementById('stitle').textContent=SCENES[0].title;
  document.querySelectorAll('.dot')[0].classList.add('on');
})();
</script>
